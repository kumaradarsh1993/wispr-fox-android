name: Android APK release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test and build release APK
        run: |
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest assembleRelease --stacktrace

      - name: Sign APK
        env:
          TAG_NAME: ${{ github.ref_name }}
          ANDROID_SIGNING_KEY_B64: ${{ secrets.ANDROID_SIGNING_KEY_B64 }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          BUILD_TOOLS="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED="app/build/outputs/apk/release/app-release-aligned.apk"
          OUT="wispr-fox-android-${TAG_NAME}.apk"

          "$BUILD_TOOLS/zipalign" -p -f 4 "$UNSIGNED" "$ALIGNED"

          if [ -n "${ANDROID_SIGNING_KEY_B64:-}" ]; then
            echo "$ANDROID_SIGNING_KEY_B64" | base64 --decode > release-signing.jks
            STORE_PASS="$ANDROID_SIGNING_STORE_PASSWORD"
            KEY_PASS="$ANDROID_SIGNING_KEY_PASSWORD"
            KEY_ALIAS="$ANDROID_SIGNING_KEY_ALIAS"
          else
            echo "No signing secrets configured; generating a Codex preview signing key for this build."
            STORE_PASS="$(openssl rand -hex 24)"
            KEY_PASS="$STORE_PASS"
            KEY_ALIAS="codex-preview"
            keytool -genkeypair \
              -keystore release-signing.jks \
              -storepass "$STORE_PASS" \
              -keypass "$KEY_PASS" \
              -alias "$KEY_ALIAS" \
              -keyalg RSA \
              -keysize 4096 \
              -validity 3650 \
              -dname "CN=wispr-fox Android Codex Preview,O=wispr-fox,C=IN"
          fi

          "$BUILD_TOOLS/apksigner" sign \
            --ks release-signing.jks \
            --ks-pass "pass:$STORE_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --ks-key-alias "$KEY_ALIAS" \
            --out "$OUT" \
            "$ALIGNED"
          "$BUILD_TOOLS/apksigner" verify --verbose "$OUT"
          echo "APK_PATH=$OUT" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_PATH }}
          path: ${{ env.APK_PATH }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "wispr-fox Android ${{ github.ref_name }} - Codex build"
          prerelease: ${{ contains(github.ref_name, 'codex') || contains(github.ref_name, 'nightly') || contains(github.ref_name, 'preview') }}
          files: ${{ env.APK_PATH }}
          body: |
            Codex build for wispr-fox Android.

            What's included:
            - Expanded speech-to-text provider support: Groq, OpenAI, Deepgram, and ElevenLabs.
            - OpenAI cleanup support alongside Groq and Gemini.
            - Safer recording startup and paste delivery checks for Android/Samsung workflows.
            - Installable APK generated by GitHub Actions from this tag.

            If repository signing secrets are not configured yet, this APK uses a temporary Codex preview signing key and may require uninstalling older APKs before installing.
