name: Android APK release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify Room migration schemas
        run: |
          test -s app/schemas/com.wisprfox.android.history.AppDatabase/1.json
          test -s app/schemas/com.wisprfox.android.history.AppDatabase/2.json
          test -s app/schemas/com.wisprfox.android.history.AppDatabase/3.json

      - name: Test and build release APK
        run: |
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest assembleRelease --stacktrace

      - name: Sign APK
        env:
          TAG_NAME: ${{ github.ref_name }}
          ANDROID_SIGNING_KEY_B64: ${{ secrets.ANDROID_SIGNING_KEY_B64 }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          BUILD_TOOLS="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED="app/build/outputs/apk/release/app-release-aligned.apk"
          OUT="wispr-fox-android-${TAG_NAME}.apk"

          "$BUILD_TOOLS/zipalign" -p -f 4 "$UNSIGNED" "$ALIGNED"

          if [ -n "${ANDROID_SIGNING_KEY_B64:-}" ]; then
            echo "$ANDROID_SIGNING_KEY_B64" | base64 --decode > release-signing.jks
            STORE_PASS="$ANDROID_SIGNING_STORE_PASSWORD"
            KEY_PASS="$ANDROID_SIGNING_KEY_PASSWORD"
            KEY_ALIAS="$ANDROID_SIGNING_KEY_ALIAS"
          else
            echo "No signing secrets configured; generating a Codex preview signing key for this build."
            STORE_PASS="$(openssl rand -hex 24)"
            KEY_PASS="$STORE_PASS"
            KEY_ALIAS="codex-preview"
            keytool -genkeypair \
              -keystore release-signing.jks \
              -storepass "$STORE_PASS" \
              -keypass "$KEY_PASS" \
              -alias "$KEY_ALIAS" \
              -keyalg RSA \
              -keysize 4096 \
              -validity 3650 \
              -dname "CN=wispr-fox Android Codex Preview,O=wispr-fox,C=IN"
          fi

          "$BUILD_TOOLS/apksigner" sign \
            --ks release-signing.jks \
            --ks-pass "pass:$STORE_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --ks-key-alias "$KEY_ALIAS" \
            --out "$OUT" \
            "$ALIGNED"
          "$BUILD_TOOLS/apksigner" verify --verbose "$OUT"
          echo "APK_PATH=$OUT" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_PATH }}
          path: ${{ env.APK_PATH }}

      # Prefer a curated docs/RELEASE_NOTES_<tag>.md (desktop convention). Fall
      # back to a generic body when that file isn't present at the tag.
      - name: Resolve release notes
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          NOTES_FILE="docs/RELEASE_NOTES_${TAG_NAME}.md"
          if [ -s "$NOTES_FILE" ]; then
            echo "RELEASE_BODY_PATH=$NOTES_FILE" >> "$GITHUB_ENV"
          else
            cat > generated-release-notes.md <<'EOF'
          Fable build for wispr-fox Android.

          What's included:
          - Updated, live-verified model lists per provider (Groq, OpenAI, Deepgram, ElevenLabs, Gemini).
          - Usage meters with free-tier limit highlighting for the provider you're using.
          - New avatars — the Oru & Gujia cats and a Siri-style orb — plus an S/M/L avatar size.
          - Reliability and delivery fixes for Android/Samsung workflows.
          - Installable APK generated by GitHub Actions from this tag.

          If repository signing secrets are not configured yet, this APK uses a temporary signing key and may require uninstalling older APKs before installing.
          EOF
            echo "RELEASE_BODY_PATH=generated-release-notes.md" >> "$GITHUB_ENV"
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "wispr-fox Android ${{ github.ref_name }} - Fable build"
          prerelease: ${{ contains(github.ref_name, 'codex') || contains(github.ref_name, 'nightly') || contains(github.ref_name, 'preview') }}
          files: ${{ env.APK_PATH }}
          body_path: ${{ env.RELEASE_BODY_PATH }}
